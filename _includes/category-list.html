{% assign categories = site.categories | sort %}
{% for category in categories %}
<h3 id="{{ category[0] }}">{{ category[0] }}</h3>
<ul>
  {% for post in category[1] %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a> — {{ post.date | date: "%Y-%m-%d" }}
    </li>
  {% endfor %}
</ul>
{% endfor %}
